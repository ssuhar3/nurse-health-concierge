<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Staff Login — Nurse Health Concierge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0B1D3A; --navy-2: #0F2444; --navy-3: #16304F;
  --blue: #3D7AB5; --blue-lt: #6BA3D6;
  --gold: #C9A54E; --gold-lt: #D4B76A; --gold-pale: #F5EDDA;
  --cream: #F7F5F1; --warm-white: #FDFBF8;
  --text: #1A1E2C; --text-mid: #4A4E5C; --text-lt: #8A8E9C;
  --radius: 6px; --radius-lg: 12px;
  --shadow-md: 0 8px 32px rgba(11,29,58,0.08);
  --shadow-lg: 0 20px 60px rgba(11,29,58,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-3) 100%);
  color: var(--text);
}
.login-card {
  background: var(--warm-white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  text-align: center;
}
.login-card img { height: 56px; margin: 0 auto 24px; }
.login-card h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 4px;
}
.login-card .subtitle {
  font-size: 13px;
  color: var(--text-lt);
  margin-bottom: 32px;
}
.form-group {
  text-align: left;
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-mid);
  margin-bottom: 8px;
}
.form-group input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(11,29,58,0.12);
  border-radius: var(--radius);
  font-size: 15px;
  font-family: inherit;
  background: var(--cream);
  transition: border-color 0.3s;
}
.form-group input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,165,78,0.15);
}
.btn-login {
  width: 100%;
  padding: 14px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}
.btn-login:hover { background: var(--navy-2); transform: translateY(-1px); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.error-msg {
  margin-top: 16px;
  padding: 10px 14px;
  background: #FFF5F5;
  color: #C53030;
  border-radius: var(--radius);
  font-size: 13px;
  display: none;
}
.error-msg.visible { display: block; }
</style>
</head>
<body>

<div class="login-card">
  <img src="/images/nhc-logo.svg" alt="NHC Logo">
  <h1>Staff Dashboard</h1>
  <p class="subtitle">Nurse Health Concierge</p>

  <form id="loginForm">
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter staff password">
    </div>
    <button type="submit" class="btn-login" id="submitBtn">Sign In</button>
  </form>

  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const submitBtn = document.getElementById('submitBtn');

// Check if already logged in
fetch('/.netlify/functions/dashboard-auth?action=verify', { credentials: 'include' })
  .then(r => { if (r.ok) window.location.href = '/dashboard/'; })
  .catch(() => {});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.classList.remove('visible');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in...';

  try {
    const res = await fetch('/.netlify/functions/dashboard-auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ password: document.getElementById('password').value }),
    });

    if (res.ok) {
      window.location.href = '/dashboard/';
    } else {
      const data = await res.json();
      errorMsg.textContent = data.error || 'Invalid password';
      errorMsg.classList.add('visible');
    }
  } catch {
    errorMsg.textContent = 'Connection error. Please try again.';
    errorMsg.classList.add('visible');
  }

  submitBtn.disabled = false;
  submitBtn.textContent = 'Sign In';
});
</script>
</body>
</html>
